<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AJRM Marine GPS Integrity</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="shell">
      <header>
        <img src="./icon.svg" alt="" class="icon">
        <div>
          <h1>AJRM Marine GPS Integrity</h1>
          <p id="subtitle">Checking navigation data...</p>
        </div>
      </header>
      <section class="control-card">
        <label class="switch-row">
          <input id="alertsEnabled" type="checkbox">
          <span>
            <strong>Enable GPS integrity alerts</strong>
            <small>Diagnostics stay visible when alerts are off.</small>
          </span>
        </label>
        <label class="setting-row" for="integrityRealignMinutes">
          <span>
            <strong>Spoofing check reset interval</strong>
            <small>
              GPS is compared with an independent dead-reckoning track. This
              sets how often that independent track is reset to GPS while GPS is
              healthy. Shorter reduces normal drift warnings; longer is stricter
              for slow spoofing.
            </small>
          </span>
          <span class="number-control">
            <input id="integrityRealignMinutes" type="number" min="1" max="1440" step="1">
            <span>min</span>
          </span>
        </label>
        <div id="settingsStatus" class="settings-status"></div>
      </section>
      <section id="stateCard" class="state-card">
        <div id="trust" class="trust">Loading</div>
        <div id="summary" class="summary"></div>
      </section>
      <section class="grid">
        <div>
          <h2>GPS</h2>
          <dl id="gpsFacts"></dl>
        </div>
        <div>
          <h2>Dead reckoning</h2>
          <dl id="drFacts"></dl>
        </div>
        <div>
          <h2>Detected errors</h2>
          <dl id="counterFacts"></dl>
        </div>
      </section>
      <section>
        <h2>Reasons</h2>
        <ul id="reasons"></ul>
      </section>
    </main>
    <script src="./app.js"></script>
  </body>
</html>
